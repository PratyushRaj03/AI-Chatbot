<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gemini UI · Modern Chat Interface</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="chat-container">
    <!-- header: minimal branding -->
    <div class="chat-header">
      <div class="header-content">
        <div class="logo-area">
          <div class="logo-icon">✨</div>
          <span class="brand-name">Chat Studio</span>
        </div>
        <div class="status-badge">ready</div>
      </div>
    </div>

    <!-- main scrollable messages area -->
    <div class="chat-messages" id="chatMessages">
      <!-- sample welcome message (bot) to demonstrate alignment & style -->
      <div class="message bot-message">
        <div class="message-bubble">
          Hello! I'm your assistant. Ask me anything — this is a pure frontend UI demo. ✨
        </div>
        <div class="message-meta">
          <span class="message-time">just now</span>
        </div>
      </div>
    </div>

    <!-- input area: field + send button -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <input type="text" id="messageInput" class="chat-input" placeholder="Send a message..." autocomplete="off">
        <button id="sendButton" class="send-button" aria-label="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
